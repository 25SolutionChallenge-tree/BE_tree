spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  # 테스트용 메일 설정 - 실제 메일을 보내지 않도록
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .html

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
            scope: email,profile
          facebook:
            client-id: test-facebook-app-id
            client-secret: test-facebook-app-secret
            scope: email,public_profile

# Custom Properties
app:
  base-url: http://localhost:8080

  # H2 콘솔 활성화
  h2:
    console:
      enabled: true

# 로깅 레벨 설정
logging:
  level:
    sql: DEBUG